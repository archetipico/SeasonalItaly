    <title>SeasonalItaly</title>
    <script>
      (function () {
        try {
          var m = document.cookie.match(/(?:^|; )mode=([^;]+)/);
          var pref = m
            ? decodeURIComponent(m[1])
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (pref === 'dark') document.documentElement.classList.add('dark');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', pref === 'dark' ? '#0f1411' : '#f4ecdb');
          var l = document.cookie.match(/(?:^|; )lang=([^;]+)/);
          if (l) {
            var lang = decodeURIComponent(l[1]).slice(0, 2);
            if (lang === 'it') document.documentElement.setAttribute('lang', lang);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
